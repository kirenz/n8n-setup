# n8n + Postgres + Caddy als produktionsähnlicher Stack.
#
# Versionspinning: alle Image-Tags sind über .env überschreibbar, haben aber
# einen festen Default. Das Default-Setup ist über das Semester reproduzierbar;
# Updates erfolgen bewusst über scripts/update.sh nach Anpassung von .env.
#
# Sicherheit: weder n8n noch Postgres exponieren Ports nach außen. Nur Caddy
# nimmt Traffic auf 80/443 entgegen und reicht ihn intern an n8n weiter.

services:
  postgres:
    # Datenbank für n8n-Workflows, -Credentials, -Executions.
    # Gepinnt auf konkretes Patch-Tag, kein "latest".
    image: postgres:${POSTGRES_IMAGE_TAG:-16.13-alpine3.23}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # n8n startet erst, wenn Postgres wirklich Anfragen beantworten kann.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  n8n:
    # Workflow-Engine. Minor-/Patch-Pinning – siehe PROJECT.md.
    image: n8nio/n8n:${N8N_IMAGE_TAG:-2.20.6}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Persistenz in Postgres (statt der Default-SQLite-Datei).
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}

      # Verschlüsselt gespeicherte Credentials. ACHTUNG: Verlust dieses
      # Schlüssels = Verlust aller Credentials. Wird vom Cloud-Init generiert
      # und über scripts/backup.sh gesichert.
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      # URL-Konfiguration. n8n braucht das für korrekte Webhook-URLs und
      # für den OAuth-Callback bei Diensten wie Google/Slack.
      N8N_HOST: ${N8N_HOST}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_PORT: 5678
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${WEBHOOK_URL}

      # Zeitzone für Cron-/Schedule-Trigger und Log-Timestamps.
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Berlin}
      TZ: ${TZ:-Europe/Berlin}

      # Telemetrie und Outbound-Calls bewusst deaktiviert. Begründung in
      # .env.example und docs/dsgvo.md.
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED:-false}
      N8N_VERSION_NOTIFICATIONS_ENABLED: ${N8N_VERSION_NOTIFICATIONS_ENABLED:-false}
      N8N_PERSONALIZATION_ENABLED: ${N8N_PERSONALIZATION_ENABLED:-false}

      # Empfohlene Defaults für Produktions-Setup.
      # N8N_RUNNERS_ENABLED ist in 2.x Default true (war Beta in 1.x);
      # wird hier explizit gesetzt, damit die Wahl im Repo sichtbar bleibt.
      N8N_RUNNERS_ENABLED: "true"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
      # Binärdaten landen im n8n_data-Volume statt im Speicher. In n8n 2.x
      # ist filesystem ohnehin Default, wir setzen es explizit für klare
      # Semantik und um Studierenden die Architektur-Entscheidung zu zeigen.
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - internal

  caddy:
    # Reverse Proxy mit automatischem TLS via Let's Encrypt.
    # on_demand TLS plus Allowlist – siehe Caddyfile.
    image: caddy:${CADDY_IMAGE_TAG:-2.11.2-alpine}
    restart: unless-stopped
    depends_on:
      - n8n
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal

# Eigenes Bridge-Netzwerk: nur die hier deklarierten Services können sich
# gegenseitig erreichen, Postgres und n8n sind nicht von außen exponiert.
networks:
  internal:
    driver: bridge

# Named Volumes für Datenpersistenz. Werden von scripts/backup.sh gesichert.
# caddy_data enthält die TLS-Zertifikate und überlebt Container-Restarts –
# wichtig für das Let's-Encrypt-Rate-Limit.
volumes:
  postgres_data:
  n8n_data:
  caddy_data:
  caddy_config:
